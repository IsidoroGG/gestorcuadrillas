                    <CopyMemberModal
                        isOpen={!!copyMemberId}
                        onClose={() => setCopyMemberId(null)}
                        store={store}
                        memberId={copyMemberId}
                    />
                </div>
            );
        };

        const IgualaView = ({ store }) => {
            const [selectedMemberId, setSelectedMemberId] = useState('');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false); // Mobile state
            const [exportMode, setExportMode] = useState('current');

            const rowCount = store.currentIguala.rows || 1;
            const spotsPerRow = store.currentIguala.count || 6;
            const rows = Array.from({ length: rowCount }, (_, i) => i + 1);
            const spots = Array.from({ length: spotsPerRow }, (_, i) => i + 1);

            // Filter unassigned members
            const assignedIds = new Set(Object.values(store.currentIguala.assignments));
            const availableMembers = store.currentMembers.filter(m => !assignedIds.has(m.id)).sort((a, b) => b.height - a.height);

            const handleAssign = (rowIdx, spotIdx) => {
                if (!selectedMemberId) return;
                store.assignSpot(rowIdx, spotIdx, selectedMemberId);
                setSelectedMemberId('');
            };

            const getSpotMember = (rowIdx, spotIdx) => {
                const id = store.currentIguala.assignments[`${rowIdx}-${spotIdx}`];
                return store.members.find(m => m.id === id);
            };

            const getSpotLabel = (row, spot) => {
                const isFirstLastRow = row === 1 || row === rowCount;
                const isOuter = spot === 1 || spot === spotsPerRow;
                const isNextOuter = spot === 2 || spot === spotsPerRow - 1;

                if (isOuter) return isFirstLastRow ? "PATERO" : "COSTERO";
                if (isNextOuter) return "FIJADOR";
                return "CORR.";
            };

            const generateIgualaTable = (pdf, cuadrillaType, pasoId, startY) => {
                const igualaKey = `${pasoId}_${cuadrillaType}`;
                const igualaConfig = store.igualaData[igualaKey] || { rows: 8, count: 6, assignments: {} };
                const localRowCount = igualaConfig.rows || 1;
                const localSpotsPerRow = igualaConfig.count || 6;
                const localRows = Array.from({ length: localRowCount }, (_, i) => i + 1);
                const localSpots = Array.from({ length: localSpotsPerRow }, (_, i) => i + 1);

                const getLocalSpotMember = (r, s) => {
                    const mId = igualaConfig.assignments[`${r}-${s}`];
                    return store.members.find(m => m.id === mId);
                };

                const getLocalSpotLabel = (r, s) => {
                    const isFirstLastRow = r === 1 || r === localRowCount;
                    const isOuter = s === 1 || s === localSpotsPerRow;
                    const isNextOuter = s === 2 || s === localSpotsPerRow - 1;
                    if (isOuter) return isFirstLastRow ? "PATERO" : "COSTERO";
                    if (isNextOuter) return "FIJADOR";
                    return "CORR.";
                };

                pdf.setFontSize(16);
                pdf.setFont('helvetica', 'bold');
                pdf.text(`Igualá - ${store.currentPaso?.name || ''} (${cuadrillaType.toUpperCase()})`, 14, startY);
                pdf.setFontSize(10);
                pdf.setFont('helvetica', 'normal');
                pdf.text(`Generado el: ${new Date().toLocaleDateString()}`, 14, startY + 7);

                const tableData = [];
                const tableHead = ["Trab."];
                for (let s = 1; s <= localSpotsPerRow; s++) tableHead.push(`Pos. ${s}`);

                localRows.forEach(row => {
                    const rowData = [`T${row}`];
                    localSpots.forEach(spot => {
                        const member = getLocalSpotMember(row, spot);
                        if (member) {
                            const displayName = (member.nickname && member.nickname.trim()) ? member.nickname : member.name;
                            rowData.push(`${displayName}\n${member.phone || '-'}`);
                        } else {
                            rowData.push(`(${getLocalSpotLabel(row, spot)})`);
                        }
                    });
                    tableData.push(rowData);
                });

                pdf.autoTable({
                    startY: startY + 15,
                    head: [tableHead],
                    body: tableData,
                    theme: 'grid',
                    styles: { fontSize: localSpotsPerRow > 6 ? 8 : 9, cellPadding: 4, valign: 'middle', halign: 'center', lineColor: [200, 200, 200], lineWidth: 0.1 },
                    headStyles: { fillColor: [64, 46, 122], textColor: 255, fontStyle: 'bold' },
                    columnStyles: { 0: { fontStyle: 'bold', fillColor: [248, 250, 252], cellWidth: 15 } }
                });
                
                return localSpotsPerRow > 6; // Return if landscape is preferred
            };

            const exportToPDF = (mode) => {
                // Peek at the max row spots to determine main orientation
                let maxSpots = spotsPerRow;
                if (mode === 'both') {
                    const bajaConfig = store.igualaData[`${store.currentPasoId}_baja`] || { count: 6 };
                    if (bajaConfig.count > maxSpots) maxSpots = bajaConfig.count;
                }
                const isLandscape = maxSpots > 6;
                const pdf = new jspdf.jsPDF({ orientation: isLandscape ? 'landscape' : 'portrait', unit: 'mm' });
                
                if (mode === 'both') {
                    generateIgualaTable(pdf, 'alta', store.currentPasoId, 15);
                    
                    // Cálculo inteligente de espacio para evitar partir la cuadrilla baja por la mitad
                    const pageHeight = pdf.internal.pageSize.getHeight();
                    const bajaConfig = store.igualaData[`${store.currentPasoId}_baja`] || { rows: 8 };
                    const localRowCount = bajaConfig.rows || 1;
                    // Altura estimada: 15mm titulo + 12mm cabecera + 12mm por cada fila
                    const estimatedHeight = 15 + 12 + (localRowCount * 12); 
                    
                    let nextStartY = pdf.lastAutoTable?.finalY ? pdf.lastAutoTable.finalY + 20 : 150;
                    
                    // Si el inicio + la altura estidada sobrepasa el final de la página (menos un margen de 15), forzamos salto
                    if (nextStartY + estimatedHeight > pageHeight - 15) {
                        pdf.addPage();
                        nextStartY = 15;
                    }

                    generateIgualaTable(pdf, 'baja', store.currentPasoId, nextStartY);
                    
                    pdf.save(`Cuadriculas_Iguala_${store.currentPaso?.name?.replace(/\s+/g, '_')}_COMPLETA.pdf`);
                } else {
                    generateIgualaTable(pdf, store.currentCuadrilla, store.currentPasoId, 15);
                    pdf.save(`Cuadricula_Iguala_${store.currentPaso?.name?.replace(/\s+/g, '_')}_${store.currentCuadrilla}.pdf`);
                }
            };

            return (
                <div className="flex flex-col md:flex-row gap-6 h-[calc(100dvh-140px)] md:h-[calc(100dvh-140px)] relative">
                    {/* Visualizer */}
                    <div className="flex-1 bg-white md:rounded-xl shadow-sm border-x-0 border-y md:border border-slate-200 p-2 md:p-6 overflow-y-auto pb-20 md:pb-6">
                        <header className="flex flex-wrap justify-between items-center mb-6 gap-4">
                            <h2 className="text-2xl font-bold text-cofrade-dark">Plano: {store.currentPaso?.name || '...'}</h2>
                            <div className="flex gap-4">
                                <div className="flex items-center gap-1 border border-slate-200 rounded-lg pr-1">
                                    <select 
                                        className="bg-transparent text-sm py-1 px-2 outline-none cursor-pointer max-w-[140px]"
                                        value={exportMode}
                                        onChange={(e) => setExportMode(e.target.value)}
                                    >
                                        <option value="current">Actual ({store.currentCuadrilla.toUpperCase()})</option>
                                        <option value="both">Ambas Cuadrillas (Alta y Baja)</option>
                                    </select>
                                    <Button variant="outline" size="sm" onClick={() => exportToPDF(exportMode)} className="flex items-center gap-1 border-0 border-l border-slate-200 rounded-none h-full" title="Descargar como PDF">
                                        <Icon name="printer" size={16} /> <span className="hidden md:inline">PDF</span>
                                    </Button>
                                </div>
                                <div className="flex items-center gap-2">
                                    <label className="text-sm text-gray-600 font-bold">Trabajaderas:</label>
                                    <input type="number" min="1" max="15" className="w-16 px-2 py-1 border rounded text-center"
                                        value={rowCount} onChange={(e) => store.setIgualaConfig({ rows: Math.max(1, parseInt(e.target.value) || 1) })} />
                                </div>
                                <div className="flex items-center gap-2">
                                    <label className="text-sm text-gray-600 font-bold">Costaleros/Palo:</label>
                                    <input type="number" min="3" max="12" className="w-16 px-2 py-1 border rounded text-center"
                                        value={spotsPerRow} onChange={(e) => {
                                            const val = Math.max(3, Math.min(12, parseInt(e.target.value) || 6));
                                            store.setIgualaConfig({ count: val });
                                        }} />
                                </div>
                            </div>
                        </header>

                        <div className="overflow-x-auto">
                            <div className="space-y-4 max-w-4xl min-w-[600px] mx-auto pb-10">
                                <div className="w-full h-4 bg-cofrade-gold/30 rounded-full mb-8 flex items-center justify-center text-[10px] text-yellow-800 font-bold uppercase tracking-widest">Frontal del Paso</div>

                                {rows.map((row) => (
                                    <div key={row} className="bg-slate-50 p-3 rounded-lg border border-slate-200">
                                        <h4 className="text-xs font-bold text-gray-400 uppercase mb-2 text-center">Trabajadera {row}</h4>
                                        <div className="flex justify-between gap-3">
                                            {spots.map(spot => {
                                                const member = getSpotMember(row, spot);
                                                const label = getSpotLabel(row, spot);
                                                const isPatero = label === 'PATERO' || label === 'COSTERO';

                                                return (
                                                    <div key={spot} className="flex-1 flex flex-col gap-1 min-w-[60px]">
                                                        <div
                                                            className={`h-24 rounded-lg border-2 border-dashed transition-all flex flex-col items-center justify-center p-1 text-center cursor-pointer group relative
                                                            ${selectedMemberId && !member ? 'border-cofrade-purple bg-purple-50 animate-pulse' : ''}
                                                            ${member ? 'bg-white border-solid border-purple-200 shadow-sm' : 'border-slate-300 hover:border-gray-400'}`}
                                                            onClick={() => !member ? handleAssign(row, spot) : null}
                                                        >
                                                            {member ? (
                                                                <>
                                                                    <button
                                                                        onClick={(e) => { e.stopPropagation(); store.unassignSpot(row, spot); }}
                                                                        className="absolute -top-2 -right-2 bg-red-100 text-red-500 rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity z-10 shadow-sm"
                                                                    >
                                                                        <Icon name="x" size={12} />
                                                                    </button>
                                                                    <span className="font-bold text-xs md:text-sm text-cofrade-dark break-words w-full leading-tight">{(member.nickname && member.nickname.trim()) ? member.nickname : member.name}</span>
                                                                    <span className="text-[10px] text-cofrade-purple font-medium mt-1">{member.phone || '-'}</span>
                                                                </>
                                                            ) : (
                                                                <span className={`text-[9px] uppercase font-bold tracking-tighter ${isPatero ? 'text-cofrade-purple' : 'text-gray-300'}`}>{label}</span>
                                                            )}
                                                        </div>
                                                    </div>
                                                )
                                            })}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Sidebar Palette - Mobile Bottom Sheet */}
                    <div className={`
                        fixed md:static left-0 right-0 z-40 bg-white md:bg-white
                        transition-all duration-300 ease-in-out shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] md:shadow-sm
                        flex flex-col overflow-hidden
                        border-t border-slate-200 md:border md:rounded-xl
                        ${isSidebarOpen ? 'h-[50dvh] bottom-[64px]' : 'h-12 bottom-[64px]'}
                        md:h-full md:w-80 md:shadow-sm md:bottom-auto
                    `}>
                        <div
                            className="p-3 md:p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center cursor-pointer md:cursor-default"
                            onClick={() => setIsSidebarOpen(!isSidebarOpen)}
                        >
                            <h3 className="font-bold text-gray-700 flex items-center gap-2">
                                <Icon name={isSidebarOpen ? "chevron-down" : "chevron-up"} size={16} className="md:hidden" />
                                Sin Asignar ({availableMembers.length})
                            </h3>
                            {selectedMemberId && <span className="text-xs bg-cofrade-purple text-white px-2 py-0.5 rounded-full animate-pulse md:hidden">1 selec.</span>}
                        </div>
                        <div className="p-2 overflow-y-auto flex-1 space-y-2">
                            {availableMembers.length === 0 ? (
                                <p className="text-center text-sm text-gray-400 py-8">Todos tienen hueco</p>
                            ) : (
                                selectedMemberId && (
                                    <div className="bg-purple-50 border border-cofrade-purple p-3 rounded-lg flex justify-between items-center mb-2">
                                        <span className="font-bold text-sm text-cofrade-purple">
                                            {(() => {
                                                const m = availableMembers.find(m => m.id === selectedMemberId);
                                                return m ? ((m.nickname && m.nickname.trim()) ? m.nickname : m.name) : '';
                                            })()}
                                        </span>
                                        <button onClick={() => setSelectedMemberId('')}><Icon name="x" size={16} /></button>
                                    </div>
                                )
                            )}

                            {availableMembers.map(member => (
                                <div
                                    key={member.id}
                                    onClick={() => setSelectedMemberId(member.id)}
                                    className={`p-3 rounded-lg border cursor-pointer transition-all hover:shadow-md flex justify-between items-center
                                        ${selectedMemberId === member.id
                                            ? 'hidden'
                                            : 'bg-white border-slate-100 hover:border-purple-200'}`}
                                >
                                    <div>
                                        <p className="font-medium text-sm">{(member.nickname && member.nickname.trim()) ? member.nickname : member.name}</p>
                                        <p className="text-xs text-gray-400">{member.position}</p>
                                    </div>
                                    <span className="font-bold text-sm text-slate-600">{member.height}</span>
                                </div>
                            ))}
                        </div>
                    </div>
                </div >
            );
        };

        const EventsView = ({ store }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ title: '', date: '', type: 'Ensayo', pasoId: 'all' });

            const displayedEvents = store.events.filter(e => e.pasoId === 'all' || e.pasoId === store.currentPasoId);

            const handleSubmit = (e) => {
                e.preventDefault();
                store.createEvent(formData);
                setFormData({ title: '', date: '', type: 'Ensayo', pasoId: 'all' });
                setIsModalOpen(false);
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-cofrade-dark">Calendario</h2>
                        <Button onClick={() => setIsModalOpen(true)} variant="primary">
                            <Icon name="plus" size={18} /> Nuevo Evento
                        </Button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                        {displayedEvents.map(event => (
                            <Card key={event.id} className="relative overflow-hidden group">
                                <div className={`absolute top-0 left-0 w-2 h-full ${event.type === 'Procesión' ? 'bg-cofrade-purple' : 'bg-cofrade-gold'}`}></div>
                                <div className="ml-4">
                                    <div className="flex gap-2 mb-2">
                                        <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded ${event.type === 'Procesión' ? 'bg-purple-100 text-purple-700' : 'bg-yellow-100 text-yellow-700'}`}>
                                            {event.type}
                                        </span>
                                        {event.pasoId === 'all' && (
                                            <span className="text-xs font-bold uppercase tracking-wider px-2 py-1 rounded bg-slate-100 text-slate-600">Global</span>
                                        )}
                                    </div>
                                    <h3 className="text-xl font-bold text-slate-800">{event.title}</h3>
                                    <div className="flex items-center text-gray-500 mt-2 text-sm">
                                        <Icon name="calendar" size={14} className="mr-2" />
                                        {new Date(event.date).toLocaleDateString()}
                                    </div>
                                </div>
                            </Card>
                        ))}
                    </div>

                    <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Nuevo Evento">
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Título</label>
                                <input required type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                    value={formData.title} onChange={e => setFormData({ ...formData, title: e.target.value })} placeholder="Ej: Primer Ensayo" />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Fecha</label>
                                <input required type="date" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                    value={formData.date} onChange={e => setFormData({ ...formData, date: e.target.value })} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
                                    <select className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none bg-white"
                                        value={formData.type} onChange={e => setFormData({ ...formData, type: e.target.value })}>
                                        <option value="Ensayo">Ensayo</option>
                                        <option value="Procesión">Procesión</option>
                                        <option value="Igualá">Igualá</option>
                                        <option value="Reunión">Reunión</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Asignar a</label>
                                    <select className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none bg-white"
                                        value={formData.pasoId} onChange={e => setFormData({ ...formData, pasoId: e.target.value })}>
                                        <option value="all">Toda la Hermandad</option>
                                        {store.pasos.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
                                    </select>
                                </div>
                            </div>
                            <div className="pt-4 flex justify-end gap-2">
                                <Button type="button" variant="ghost" onClick={() => setIsModalOpen(false)}>Cancelar</Button>
                                <Button type="submit">Crear Evento</Button>
                            </div>
                        </form>
                    </Modal>
                </div>
            )
        }

        const AspirantesView = ({ store }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({
                dni: '', name: '', nickname: '', address: '', height: '', phone: '', position: 'Costero', status: 'aspirante', startYear: ''
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                const memberData = { ...formData, status: 'aspirante' };
                if (editingId) {
                    store.updateMember(editingId, memberData);
                } else {
                    store.addMember(memberData);
                }
                closeModal();
            };

            const openEdit = (member) => {
                setFormData({
                    dni: member.dni || '',
                    name: member.name,
                    nickname: member.nickname || '',
                    address: member.address || '',
                    height: member.height,
                    phone: member.phone || '',
                    position: member.position || 'Costero',
                    startYear: member.startYear || ''
                });
                setEditingId(member.id);
                setIsModalOpen(true);
            };

            const handleExport = () => {
                const headers = ["DNI", "Nombre", "Teléfono", "Altura", "Trabajadera", "Puesto", "Año 1ª Igualá"];
                const data = store.currentAspirantes.map(m => [
                    m.dni || '',
                    m.name,
                    m.phone || '',
                    `${m.height} cm`,
                    m.trabajadera || '-',
                    m.position,
                    m.startYear || '-'
                ]);
                exportToPDF(`Listado Aspirantes: ${store.currentPaso.name}`, headers, data, `aspirantes_${store.currentPaso.name}.pdf`);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingId(null);
                setFormData({ dni: '', name: '', nickname: '', address: '', height: '', phone: '', position: 'Costero', status: 'aspirante', startYear: '' });
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-cofrade-dark">Aspirantes: {store.currentPaso.name}</h2>
                        <div className="flex gap-2">
                            <Button onClick={handleExport} variant="ghost" className="bg-white border hover:bg-slate-50 text-slate-600">
                                <Icon name="file-down" size={18} /> PDF
                            </Button>
                            <Button onClick={() => setIsModalOpen(true)} variant="primary">
                                <Icon name="plus" size={18} /> Nuevo Aspirante
                            </Button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-slate-50 text-slate-500 font-semibold uppercase text-xs hidden md:table-header-group">
                                <tr>
                                    <th className="p-4">Aspirante</th>
                                    <th className="p-4 hidden md:table-cell">Contacto</th>
                                    <th className="p-4">Altura</th>
                                    <th className="p-4">Trab.</th>
                                    <th className="p-4">Puesto</th>
                                    <th className="p-4">Año 1ª Igualá</th>
                                    <th className="p-4 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {store.currentAspirantes.length === 0 ? (
                                    <tr>
                                        <td colSpan="7" className="p-8 text-center text-gray-400">
                                            No hay aspirantes registrados en este paso.
                                        </td>
                                    </tr>
                                ) : store.currentAspirantes.map(member => (
                                    <React.Fragment key={member.id}>
                                        {/* Desktop Row */}
                                        <tr className="hover:bg-slate-50 transition-colors hidden md:table-row">
                                            <td className="p-4">
                                                <div className="font-bold text-slate-800">{member.name}</div>
                                                {member.nickname && <div className="text-xs text-cofrade-purple font-medium">"{member.nickname}"</div>}
                                                <div className="text-xs text-gray-400 uppercase mt-0.5">{member.dni}</div>
                                            </td>
                                            <td className="p-4 hidden md:table-cell">
                                                <div className="text-sm text-slate-600 flex items-center gap-1">
                                                    <Icon name="phone" size={12} /> {member.phone}
                                                </div>
                                                {member.address && (
                                                    <div className="text-xs text-slate-400 mt-1 flex items-center gap-1">
                                                        <Icon name="map-pin" size={12} /> {member.address}
                                                    </div>
                                                )}
                                            </td>
                                            <td className="p-4 text-slate-600 font-medium">{member.height} cm</td>
                                            <td className="p-4 font-bold text-slate-700 text-center">
                                                {member.trabajadera || '-'}
                                            </td>
                                            <td className="p-4">
                                                <span className="bg-purple-50 text-cofrade-purple px-2 py-1 rounded-md text-xs font-semibold uppercase tracking-wide w-fit">
                                                    {member.position}
                                                </span>
                                            </td>
                                            <td className="p-4 text-slate-600 font-medium">
                                                {member.startYear || '-'}
                                            </td>
                                            <td className="p-4 text-right flex justify-end gap-2">
                                                <button onClick={() => store.promoteAspirante(member)} className="text-green-600 hover:text-green-800 flex items-center gap-1 text-sm font-medium mr-2 bg-green-50 px-2 py-1 rounded border border-green-200" title="Ascender a Titular">
                                                    <Icon name="arrow-up-circle" size={16} /> <span className="hidden sm:inline">Ascender</span>
                                                </button>
                                                <button onClick={() => openEdit(member)} className="text-blue-500 hover:text-blue-700">
                                                    <Icon name="pencil" size={18} />
                                                </button>
                                                <button onClick={() => { if (confirm('¿Borrar aspirante?')) store.deleteMember(member.id) }} className="text-red-400 hover:text-red-600">
                                                    <Icon name="trash-2" size={18} />
                                                </button>
                                            </td>
                                        </tr>

                                        {/* Mobile Card */}
                                        <tr className="md:hidden block border-b border-slate-100 p-4">
                                            <td className="block">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <div className="font-bold text-slate-800 text-lg">{member.name}</div>
                                                        <div className="flex items-center gap-2 text-sm text-gray-500">
                                                            {member.nickname && <span className="text-cofrade-purple font-medium">"{member.nickname}"</span>}
                                                            <span>• {member.height} cm</span>
                                                        </div>
                                                    </div>
                                                    <span className="bg-purple-50 text-cofrade-purple px-2 py-1 rounded-md text-[10px] font-semibold uppercase tracking-wide">
                                                        {member.position}
                                                    </span>
                                                </div>

                                                <div className="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-3">
                                                    <div className="flex items-center gap-1"><Icon name="phone" size={12} /> {member.phone || '-'}</div>
                                                    <div className="flex items-center gap-1"><Icon name="calendar" size={12} /> 1ª Igualá: <span className="font-bold">{member.startYear || '-'}</span></div>
                                                </div>

                                                <div className="grid grid-cols-2 gap-2 mt-3">
                                                    <Button onClick={() => store.promoteAspirante(member)} variant="ghost" className="col-span-2 bg-green-50 border border-green-200 text-green-700 text-xs py-1 h-8 flex items-center justify-center gap-2">
                                                        <Icon name="arrow-up-circle" size={14} /> Ascender a Titular
                                                    </Button>
                                                    <Button onClick={() => openEdit(member)} variant="ghost" className="bg-slate-50 border border-slate-200 text-xs py-1 h-8">
                                                        Editar
                                                    </Button>
                                                    <Button onClick={() => { if (confirm('¿Borrar?')) store.deleteMember(member.id) }} variant="ghost" className="bg-red-50 border border-red-100 text-red-600 text-xs py-1 h-8">
                                                        Borrar
                                                    </Button>
                                                </div>
                                            </td>
                                        </tr>
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <Modal isOpen={isModalOpen} onClose={closeModal} title={editingId ? "Editar Aspirante" : "Nuevo Aspirante"}>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-3 gap-4">
                                <div className="col-span-1">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">DNI</label>
                                    <input required type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none uppercase"
                                        value={formData.dni} onChange={e => setFormData({ ...formData, dni: e.target.value })} placeholder="12345678A" />
                                </div>
                                <div className="col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                                    <input required type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} placeholder="Ej: Juan Pérez" />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Apodo / Mote</label>
                                    <input type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.nickname} onChange={e => setFormData({ ...formData, nickname: e.target.value })} placeholder='Ej: "El Largo"' />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                                    <input type="tel" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.phone} onChange={e => setFormData({ ...formData, phone: e.target.value })} placeholder="600000000" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                                <input type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                    value={formData.address} onChange={e => setFormData({ ...formData, address: e.target.value })} placeholder="C/ Gran Poder, 2" />
                            </div>

                            <div className="grid grid-cols-3 gap-4">
                                <div className="col-span-1">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Altura (cm)</label>
                                    <input required type="number" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.height} onChange={e => setFormData({ ...formData, height: e.target.value })} placeholder="175" />
                                </div>
                                <div className="col-span-1">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Trabajadera</label>
                                    <input type="number" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.trabajadera || ''} onChange={e => setFormData({ ...formData, trabajadera: e.target.value })} placeholder="-" />
                                </div>
                                <div className="col-span-1">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">1ª Igualá (Año)</label>
                                    <input type="number" min="1900" max="2100" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.startYear} onChange={e => setFormData({ ...formData, startYear: e.target.value })} placeholder="2024" />
                                </div>
                                <div className="col-span-1">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Puesto</label>
                                    <select className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none bg-white"
                                        value={formData.position} onChange={e => setFormData({ ...formData, position: e.target.value })}>
                                        <option value="Patero">Patero</option>
                                        <option value="Fijador">Fijador</option>
                                        <option value="Costero">Costero</option>
                                        <option value="Corriente">Corriente</option>
                                    </select>
                                </div>
                            </div>
                            <div className="pt-4 flex justify-end gap-2">
                                <Button type="button" variant="ghost" onClick={closeModal}>Cancelar</Button>
                                <Button type="submit">{editingId ? 'Guardar Cambios' : 'Registrar'}</Button>
                            </div>
                        </form>
                    </Modal>
                </div>
            )
        }

        // --- Layout ---

        const SidebarItem = ({ icon, label, active, onClick }) => (
            <button
                onClick={onClick}
                className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-all font-medium mb-1
                    ${active
                        ? 'bg-cofrade-purple text-white shadow-md'
                        : 'text-slate-400 hover:bg-slate-800 hover:text-white'}`}
            >
                <Icon name={icon} size={20} />
                {label}
            </button>
        );

        const MobileNavItem = ({ icon, label, active, onClick }) => (
            <button
                onClick={onClick}
                className={`flex flex-col items-center justify-center w-full py-2 transition-colors
                    ${active ? 'text-cofrade-purple' : 'text-slate-400'}`}
            >
                <Icon name={icon} size={20} className={active ? "mb-1" : "mb-1 opacity-70"} />
                <span className="text-[10px] font-medium">{label}</span>
            </button>
        );

        const MobileNav = ({ view, setView }) => (
            <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-end pb-safe px-2 h-16 z-50 md:hidden shadow-[0_-5px_10px_rgba(0,0,0,0.05)]">
                <MobileNavItem icon="users" label="Cuadrilla" active={view === 'members'} onClick={() => setView('members')} />
                <MobileNavItem icon="layout-grid" label="Igualá" active={view === 'iguala'} onClick={() => setView('iguala')} />
                <div className="relative -top-5">
                    <button
                        onClick={() => setView('dashboard')}
                        className={`w-14 h-14 rounded-full flex items-center justify-center shadow-lg border-4 border-slate-50 transition-transform ${view === 'dashboard' ? 'bg-cofrade-purple text-white scale-110' : 'bg-cofrade-gold text-white'}`}
                    >
                        <Icon name="crown" size={28} />
                    </button>
                </div>
                <MobileNavItem icon="calendar" label="Eventos" active={view === 'events'} onClick={() => setView('events')} />
                <MobileNavItem icon="menu" label="Menu" active={['aspirantes', 'settings'].includes(view)} onClick={() => setView('settings')} />
            </div>
        );

        const PasoSelector = ({ store, mobile }) => {
            const [isCreating, setIsCreating] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [newName, setNewName] = useState('');
            const [newType, setNewType] = useState('Cristo');
            const [editName, setEditName] = useState('');

            const handleCreate = (e) => {
                e.preventDefault();
                store.createPaso(newName, newType);
                setNewName('');
                setIsCreating(false);
            };

            const startEdit = () => {
                setEditName(store.currentPaso.name);
                setIsEditing(true);
            };

            const handleUpdate = (e) => {
                e.preventDefault();
                if (editName.trim()) {
                    store.updatePaso(store.currentPasoId, editName);
                    setIsEditing(false);
                }
            };

            return (
                <div className={`${mobile ? '' : 'px-4 mb-6'}`}>
                    {!mobile && (
                        <div className="flex justify-between items-center px-2 mb-2">
                            <p className="text-xs font-bold text-slate-500 uppercase tracking-wider">Paso Activo</p>
                            {!isEditing && !isCreating && (
                                <button onClick={startEdit} className="text-slate-500 hover:text-white transition-colors" title="Editar nombre">
                                    <Icon name="pencil" size={12} />
                                </button>
                            )}
                        </div>
                    )}

                    {isEditing ? (
                        <form onSubmit={handleUpdate} className="flex gap-2">
                            <input
                                autoFocus
                                className="w-full bg-slate-800 text-white rounded-lg px-2 py-1 text-sm outline-none border border-cofrade-purple focus:ring-1 focus:ring-cofrade-purple font-medium"
                                value={editName}
                                onChange={e => setEditName(e.target.value)}
                            />
                            <button type="submit" className="text-green-400 hover:text-green-300"><Icon name="check" size={16} /></button>
                            <button type="button" onClick={() => setIsEditing(false)} className="text-red-400 hover:text-red-300"><Icon name="x" size={16} /></button>
                        </form>
                    ) : (
                        <div className="relative">
                            <select
                                className="w-full bg-slate-800 text-white rounded-lg px-3 py-2 appearance-none cursor-pointer focus:ring-2 focus:ring-cofrade-gold outline-none border border-slate-700 font-medium"
                                value={store.currentPasoId}
                                onChange={(e) => {
                                    if (e.target.value === 'NEW') setIsCreating(true);
                                    else store.setCurrentPasoId(e.target.value);
                                }}
                            >
                                {store.pasos.map(p => (
                                    <option key={p.id} value={p.id}>{p.name}</option>
                                ))}
                                <option value="NEW">+ Nuevo Paso...</option>
                            </select>
                            <div className="absolute right-3 top-3 pointer-events-none text-slate-400">
                                <Icon name="chevron-down" size={16} />
                            </div>
                        </div>
                    )}

                    {/* Cuadrilla Toggle */}
                    {!isCreating && (
                        <div className="mt-2 flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                            <button
                                onClick={() => store.setCurrentCuadrilla('alta')}
                                className={`flex-1 text-xs py-1 rounded transition-colors ${store.currentCuadrilla === 'alta' ? 'bg-cofrade-purple text-white font-bold' : 'text-slate-400 hover:text-white'}`}
                            >
                                Alta
                            </button>
                            <button
                                onClick={() => store.setCurrentCuadrilla('baja')}
                                className={`flex-1 text-xs py-1 rounded transition-colors ${store.currentCuadrilla === 'baja' ? 'bg-cofrade-purple text-white font-bold' : 'text-slate-400 hover:text-white'}`}
                            >
                                Baja
                            </button>
                        </div>
                    )}

                    {isCreating && (
                        <div className="mt-3 p-3 bg-slate-800 rounded-lg border border-slate-700 animate-in fade-in slide-in-from-top-2">
                            <form onSubmit={handleCreate} className="space-y-2">
                                <input autoFocus required placeholder="Nombre (ej. Palio)" className="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm text-white"
                                    value={newName} onChange={e => setNewName(e.target.value)} />
                                <select className="w-full bg-slate-900 border border-slate-700 rounded px-2 py-1 text-sm text-white"
                                    value={newType} onChange={e => setNewType(e.target.value)}>
                                    <option value="Cristo">Cristo</option>
                                    <option value="Palio">Palio</option>
                                    <option value="Misterio">Misterio</option>
                                    <option value="Gloria">Gloria</option>
                                </select>
                                <div className="flex gap-2 pt-1">
                                    <button type="button" onClick={() => setIsCreating(false)} className="flex-1 py-1 text-xs text-slate-400 hover:text-white">Cancelar</button>
                                    <button type="submit" className="flex-1 py-1 text-xs bg-cofrade-purple text-white rounded hover:bg-purple-600">Crear</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('dashboard');
            const store = useCostaleroStore();

            useEffect(() => {
                lucide.createIcons();
            });

            return (
                <div className="flex h-screen md:h-screen h-[100dvh] font-sans relative overflow-hidden">
                    {/* Background Image */}
                    {store.currentBgImage ? (
                        <div className="absolute inset-0 z-0 pointer-events-none" style={{
                            backgroundImage: `url(${store.currentBgImage})`,
                            backgroundSize: 'cover',
                            backgroundPosition: 'center',
                            filter: 'blur(10px)',
                            transform: 'scale(1.1)'
                        }}></div>
                    ) : (
                        <div className="absolute inset-0 z-0 bg-slate-50"></div>
                    )}

                    {/* Sidebar (Desktop) */}
                    <aside className="hidden md:flex w-64 bg-cofrade-dark text-white flex-col shadow-2xl z-10 shrink-0">
                        <div className="p-6 border-b border-slate-700 flex items-center gap-3 mb-2">
                            <div className="bg-cofrade-gold p-2 rounded-lg text-cofrade-dark">
                                <Icon name="crown" size={24} />
                            </div>
                            <div>
                                <h1 className="font-bold text-lg tracking-tight">Gestor Cuadrillas</h1>
                                <p className="text-xs text-slate-400">Panel de Control</p>
                            </div>
                        </div>

                        <PasoSelector store={store} />

                        <nav className="flex-1 px-4 overflow-y-auto">
                            <SidebarItem icon="layout-dashboard" label="Panel" active={view === 'dashboard'} onClick={() => setView('dashboard')} />
                            <SidebarItem icon="users" label="Cuadrilla" active={view === 'members'} onClick={() => setView('members')} />
                            <SidebarItem icon="user-plus" label="Aspirantes" active={view === 'aspirantes'} onClick={() => setView('aspirantes')} />
                            <SidebarItem icon="layout-grid" label="La Igualá" active={view === 'iguala'} onClick={() => setView('iguala')} />
                            <SidebarItem icon="calendar" label="Eventos" active={view === 'events'} onClick={() => setView('events')} />
                            <div className="my-4 border-t border-slate-700"></div>
                            <SidebarItem icon="settings" label="Configuración" active={view === 'settings'} onClick={() => setView('settings')} />
                        </nav>

                        <div className="p-4 border-t border-slate-700">
                            <div className="flex items-center gap-3 px-4 py-2 opacity-60 hover:opacity-100 transition-opacity cursor-pointer text-red-400"
                                onClick={() => { if (confirm('¿Borrar Paso actual?')) store.deletePaso(store.currentPasoId) }}>
                                <Icon name="trash-2" size={16} />
                                <span className="text-xs">Borrar Paso Actual</span>
                            </div>
                        </div>
                    </aside>

                    {/* Mobile Header */}
                    <div className="md:hidden absolute top-0 left-0 right-0 h-16 bg-cofrade-dark text-white z-20 flex items-center justify-between px-4 shadow-md">
                        <div className="flex items-center gap-2">
                            <div className="bg-cofrade-gold p-1.5 rounded-lg text-cofrade-dark">
                                <Icon name="crown" size={18} />
                            </div>
                            <span className="font-bold text-lg">Gestor</span>
                        </div>
                        <div className="w-48">
                            <PasoSelector store={store} mobile={true} />
                        </div>
                    </div>

                    {/* Main Content */}
                    <main className="flex-1 overflow-y-auto z-10 relative bg-slate-50/50 pt-16 pb-20 md:pt-0 md:pb-0">
                        <div className="p-0 md:p-8 max-w-7xl mx-auto min-h-full">
                            {view === 'dashboard' && <Dashboard store={store} setView={setView} />}
                            {view === 'members' && <MembersView store={store} />}
                            {view === 'aspirantes' && <AspirantesView store={store} />}
                            {view === 'iguala' && <IgualaView store={store} />}
                            {view === 'events' && <EventsView store={store} />}
                            {view === 'settings' && <SettingsView store={store} />}
                        </div>
                    </main>

                    {/* Mobile Navigation */}
                    <MobileNav view={view} setView={setView} />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
