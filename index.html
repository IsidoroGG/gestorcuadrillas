<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Cuadrillas - Online</title>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons (Global) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Custom Backend API (via fetch) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- jsPDF & AutoTable -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cofrade: {
                            purple: '#4c1d95',
                            gold: '#fbbf24',
                            dark: '#1e293b',
                            light: '#f8fafc',
                            muted: '#64748b'
                        }
                    },
                    fontFamily: {
                        sans: ['Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #f3f4f6;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #c7c7c7;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }

        /* Mobile Optimizations */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom);
        }

        .h-dvh {
            height: 100dvh;
        }

        body {
            overscroll-behavior-y: none;
        }

        @media screen and (max-width: 768px) {

            input,
            select,
            textarea {
                font-size: 16px !important;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Utils & Components ---

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, [name]);
            return <i data-lucide={name} width={size} height={size} className={className}></i>;
        };

        const Button = ({ children, onClick, variant = 'primary', className = '', ...props }) => {
            const baseStyle = "px-4 py-2 rounded-lg font-medium transition-all duration-200 flex items-center gap-2 justify-center";
            const variants = {
                primary: "bg-cofrade-purple text-white hover:bg-purple-800 shadow-md",
                outline: "border-2 border-cofrade-purple text-cofrade-purple hover:bg-purple-50",
                ghost: "text-gray-600 hover:bg-gray-100",
                gold: "bg-cofrade-gold text-white hover:bg-yellow-500 shadow-md text-slate-900",
                danger: "bg-red-50 text-red-600 hover:bg-red-100 border border-red-200"
            };
            return (
                <button onClick={onClick} className={`${baseStyle} ${variants[variant]} ${className}`} {...props}>
                    {children}
                </button>
            );
        };

        const exportToPDF = (title, headers, data, filename) => {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFontSize(18);
            doc.text(title, 14, 20);

            doc.setFontSize(10);
            doc.text(`Fecha: ${new Date().toLocaleDateString()}`, 14, 28);

            doc.autoTable({
                head: [headers],
                body: data,
                startY: 35,
                theme: 'grid',
                styles: { fontSize: 8 },
                headStyles: { fillColor: [76, 29, 149] } // cofrade-purple
            });

            doc.save(filename);
        };

        const Card = ({ children, className = "" }) => (
            <div className={`bg-white rounded-xl shadow-sm border border-slate-100 p-6 ${className}`}>
                {children}
            </div>
        );

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-0 md:p-4 backdrop-blur-sm">
                    <div className="bg-white w-full h-full md:h-auto md:max-h-[90vh] md:w-full md:max-w-md md:rounded-2xl shadow-2xl overflow-hidden flex flex-col animate-in fade-in zoom-in duration-200">
                        <div className="flex justify-between items-center p-4 md:p-6 border-b border-gray-100 shrink-0 bg-white z-10">
                            <h3 className="text-xl font-bold text-cofrade-dark">{title}</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-2">
                                <Icon name="x" size={24} />
                            </button>
                        </div>
                        <div className="p-4 md:p-6 overflow-y-auto flex-1">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Data Store Logic (Hybrid: LocalStorage + Supabase) ---

        const useCostaleroStore = () => {
            // -- Credentials --
            // -- Backend Configuration --
            const [supabaseUrl, setSupabaseUrl] = useState(() => {
                return localStorage.getItem('cofrade_supabase_url') || '';
            });
            const [supabaseKey, setSupabaseKey] = useState(() => {
                return localStorage.getItem('cofrade_supabase_key') || '';
            });
            const [isOnline, setIsOnline] = useState(false);
            const [syncStatus, setSyncStatus] = useState('idle'); // idle, syncing, success, error

            const supabaseClient = useMemo(() => {
                if (supabaseUrl && supabaseKey && window.supabase) {
                    try {
                        return window.supabase.createClient(supabaseUrl, supabaseKey);
                    } catch (e) {
                        return null;
                    }
                }
                return null;
            }, [supabaseUrl, supabaseKey]);

            useEffect(() => {
                setIsOnline(!!supabaseClient);
            }, [supabaseClient]);

            const setSupabaseConfig = (url, key) => {
                setSupabaseUrl(url);
                setSupabaseKey(key);
                if (url && key) {
                    localStorage.setItem('cofrade_supabase_url', url);
                    localStorage.setItem('cofrade_supabase_key', key);
                } else {
                    localStorage.removeItem('cofrade_supabase_url');
                    localStorage.removeItem('cofrade_supabase_key');
                }
            };

            // -- App State --
            const [pasos, setPasos] = useState(() => {
                const saved = localStorage.getItem('cofrade_pasos');
                return saved ? JSON.parse(saved) : [{ id: 'default', name: 'Mi Paso', type: 'Cristo' }];
            });

            const [currentPasoId, setCurrentPasoId] = useState(() => {
                return localStorage.getItem('cofrade_current_paso') || 'default';
            });
            const [currentCuadrilla, setCurrentCuadrilla] = useState('alta'); // 'alta' | 'baja'

            const [members, setMembers] = useState(() => {
                const saved = localStorage.getItem('cofrade_members');
                let parsed = saved ? JSON.parse(saved) : [];
                return parsed.map(m => m.pasoId ? m : { ...m, pasoId: 'default' });
            });

            const [igualaData, setIgualaData] = useState(() => {
                const saved = localStorage.getItem('cofrade_iguala_multi');
                let data = saved ? JSON.parse(saved) : { 'default': { rows: 8, count: 6, assignments: {} } };
                // Fix legacy
                Object.keys(data).forEach(id => {
                    if (!data[id].count) data[id].count = 6;
                });
                return data;
            });

            const [events, setEvents] = useState(() => {
                const saved = localStorage.getItem('cofrade_events');
                let parsed = saved ? JSON.parse(saved) : [];
                return parsed.map(e => e.pasoId ? e : { ...e, pasoId: 'all' });
            });

            const [backgroundImages, setBackgroundImages] = useState(() => {
                const legacy = localStorage.getItem('cofrade_bg_image');
                const saved = localStorage.getItem('cofrade_bg_images');
                if (saved) return JSON.parse(saved);
                // Migration: If legacy exists, we can't easily assign it without pasoids loaded, 
                // but initialization order matters. We'll start empty or migrating later if needed.
                // For now, let's just start empty or with legacy if we want to be fancy, but simple is better.
                return {};
            });

            // -- Initialization --

            // -- Initialization --

            // -- Persistence (Local) --
            useEffect(() => localStorage.setItem('cofrade_pasos', JSON.stringify(pasos)), [pasos]);
            useEffect(() => localStorage.setItem('cofrade_current_paso', currentPasoId), [currentPasoId]);
            useEffect(() => localStorage.setItem('cofrade_members', JSON.stringify(members)), [members]);
            useEffect(() => localStorage.setItem('cofrade_iguala_multi', JSON.stringify(igualaData)), [igualaData]);
            useEffect(() => localStorage.setItem('cofrade_events', JSON.stringify(events)), [events]);
            useEffect(() => localStorage.setItem('cofrade_bg_images', JSON.stringify(backgroundImages)), [backgroundImages]);


            // -- Supabase Sync Functions --

            // -- Backend Sync Functions --

            const fetchFromBackend = async () => {
                if (!supabaseClient) return;
                setSyncStatus('syncing');
                try {
                    const [resPasos, resMembers, resIguala, resEvents] = await Promise.all([
                        supabaseClient.from('pasos').select('*').then(r => { if (r.error) throw r.error; return r.data; }),
                        supabaseClient.from('members').select('*').then(r => { if (r.error) throw r.error; return r.data; }),
                        supabaseClient.from('iguala').select('*').then(r => { if (r.error) throw r.error; return r.data; }),
                        supabaseClient.from('events').select('*').then(r => { if (r.error) throw r.error; return r.data; })
                    ]);

                    if (resPasos && Array.isArray(resPasos) && resPasos.length > 0) {
                        setPasos(resPasos.map(p => ({ id: p.id, name: p.name, type: p.type })));
                        
                        const newBgImages = {};
                        resPasos.forEach(p => {
                            if (p.bg_image) newBgImages[p.id] = p.bg_image;
                        });
                        if (Object.keys(newBgImages).length > 0) {
                            setBackgroundImages(newBgImages);
                        }

                        // If current ID doesn't exist in remote, reset to first
                        if (!resPasos.find(p => p.id === currentPasoId)) {
                            setCurrentPasoId(resPasos[0].id);
                        }
                    }
                    if (resMembers && Array.isArray(resMembers)) {
                        const mappedMembers = resMembers.map(m => ({
                            id: m.id,
                            pasoId: m.paso_id,
                            dni: m.dni,
                            name: m.name,
                            nickname: m.nickname,
                            address: m.address,
                            height: m.height,
                            phone: m.phone,
                            position: m.position,
                            status: m.status || 'titular',
                            startYear: m.start_year,
                            trabajadera: m.trabajadera,
                            cuadrilla_type: m.cuadrilla_type || 'alta'
                        }));
                        setMembers(mappedMembers);
                    }
                    if (resIguala && Array.isArray(resIguala)) {
                        const newIguala = {};
                        resIguala.forEach(row => {
                            const key = row.cuadrilla_type ? `${row.paso_id}_${row.cuadrilla_type}` : row.paso_id;
                            newIguala[key] = {
                                ...row.config, // { rows: X, count: Y }
                                assignments: row.assignments // { "1-1": "id" }
                            };
                        });
                        setIgualaData(prev => ({ ...prev, ...newIguala }));
                    }
                    if (resEvents && Array.isArray(resEvents)) {
                        const mappedEvents = resEvents.map(e => ({
                            id: e.id,
                            pasoId: e.paso_id,
                            title: e.title,
                            date: e.date,
                            type: e.type
                        }));
                        setEvents(mappedEvents);
                    }
                    setSyncStatus('success');
                } catch (error) {
                    console.error("Fetch error", error);
                    setSyncStatus('error');
                    throw error;
                }
            };

            // Auto-fetch at startup when Supabase connection exists
            useEffect(() => {
                if (isOnline) {
                    fetchFromBackend().catch(e => console.warn("Auto-sync initial fetch logic failed silently as expected.", e));
                }
            }, [isOnline]);


            const pushAllToBackend = async () => {
                if (!supabaseClient) return alert("No hay conexión con Supabase configurada.");
                setSyncStatus('syncing');
                try {
                    // Borrar datos antiguos en cascada inverso para evitar conflictos
                    const { error: err1 } = await supabaseClient.from('events').delete().neq('id', 'dummy');
                    if (err1) throw err1;
                    const { error: err2 } = await supabaseClient.from('iguala').delete().neq('id', 'dummy');
                    if (err2) throw err2;
                    const { error: err3 } = await supabaseClient.from('members').delete().neq('id', 'dummy');
                    if (err3) throw err3;
                    const { error: err4 } = await supabaseClient.from('pasos').delete().neq('id', 'dummy');
                    if (err4) throw err4;

                    if (pasos.length > 0) {
                        const { error } = await supabaseClient.from('pasos').upsert(
                            pasos.map(p => ({ id: p.id, name: p.name, type: p.type, bg_image: backgroundImages[p.id] || null }))
                        );
                        if (error) throw error;
                    }
                    
                    const validPasoIds = new Set(pasos.map(p => p.id));

                    if (members.length > 0) {
                        const validMembers = members.filter(m => validPasoIds.has(m.pasoId));
                        if (validMembers.length > 0) {
                            const { error } = await supabaseClient.from('members').upsert(
                                validMembers.map(m => ({
                                    id: m.id,
                                    paso_id: m.pasoId,
                                    dni: m.dni,
                                    name: m.name,
                                    nickname: m.nickname,
                                    address: m.address,
                                    height: m.height,
                                    phone: m.phone,
                                    position: m.position,
                                    status: m.status,
                                    start_year: m.startYear,
                                    trabajadera: m.trabajadera,
                                    cuadrilla_type: m.cuadrilla_type || 'alta'
                                }))
                            );
                            if (error) throw error;
                        }
                    }
                    if (Object.keys(igualaData).length > 0) {
                        const igualaUpsert = Object.entries(igualaData)
                            .filter(([key]) => validPasoIds.has(key.split('_')[0]))
                            .map(([key, data]) => {
                                const parts = key.split('_');
                                const pId = parts[0];
                                const cType = parts.length > 1 ? parts.slice(1).join('_') : 'alta';
                                return {
                                    id: key,
                                    paso_id: pId,
                                    cuadrilla_type: cType,
                                    config: { rows: data.rows, count: data.count },
                                    assignments: data.assignments
                                };
                            });
                        if (igualaUpsert.length > 0) {
                            const { error } = await supabaseClient.from('iguala').upsert(igualaUpsert);
                            if (error) throw error;
                        }
                    }
                    if (events.length > 0) {
                        const validEvents = events.filter(e => validPasoIds.has(e.pasoId));
                        if (validEvents.length > 0) {
                            const { error } = await supabaseClient.from('events').upsert(
                                validEvents.map(e => ({
                                    id: e.id,
                                    paso_id: e.pasoId,
                                    title: e.title,
                                    date: e.date,
                                    type: e.type
                                }))
                            );
                            if (error) throw error;
                        }
                    }
                    setSyncStatus('success');
                    alert("¡Todos los datos locales se han subido a Supabase con éxito!");
                } catch (error) {
                    console.error("Push error", error);
                    setSyncStatus('error');
                    let errMsg = error.message || error.details || JSON.stringify(error);
                    alert("Error en Supabase: " + errMsg + "\n\n(Asegúrate de que tus tablas de Supabase coincidan con las indicadas en las instrucciones, si acabas de añadir la parte de imágenes tenías que ejecutar el ALTER TABLE)");
                }
            };


            const toggleOnline = (url, key) => {
                // Legacy support for clearing credentials
                if (!url) {
                    if (confirm("¿Desconectar del backend?")) {
                        setBackendUrl('');
                    }
                }
            };

            // -- Actions (Optimistic UI updates) --

            const createPaso = async (name, type) => {
                const newId = Date.now().toString();
                const newPaso = { id: newId, name, type };

                setPasos([...pasos, newPaso]);
                setPasos([...pasos, newPaso]);
                setIgualaData(prev => ({
                    ...prev,
                    [`${newId}_alta`]: { rows: 8, count: 6, assignments: {} },
                    [`${newId}_baja`]: { rows: 8, count: 6, assignments: {} }
                }));
                setCurrentPasoId(newId);

                if (isOnline) {
                    try {
                        const { error: error1 } = await supabaseClient.from('pasos').insert({ id: newId, name, type });
                        if (error1) throw error1;
                        const { error: error2 } = await supabaseClient.from('iguala').insert([
                            {
                                paso_id: newId,
                                cuadrilla_type: 'alta',
                                config: { rows: 8, count: 6 },
                                assignments: {}
                            },
                            {
                                paso_id: newId,
                                cuadrilla_type: 'baja',
                                config: { rows: 8, count: 6 },
                                assignments: {}
                            }
                        ]);
                        if (error2) throw error2;
                    } catch (e) {
                        console.error('API Error', e);
                        setSyncStatus('error');
                    }
                }
            };

            const updatePaso = async (id, newName) => {
                setPasos(pasos.map(p => p.id === id ? { ...p, name: newName } : p));

                if (isOnline) {
                    await supabaseClient.from('pasos').update({ name: newName }).eq('id', id);
                }
            };

            const deletePaso = async (id) => {
                if (pasos.length <= 1) return alert("No puedes borrar el último paso.");
                if (!confirm("¿Seguro que quieres borrar este paso y todos sus datos?")) return;

                setPasos(pasos.filter(p => p.id !== id));
                setMembers(members.filter(m => m.pasoId !== id));
                setIgualaData(prev => {
                    const next = { ...prev };
                    delete next[id];
                    return next;
                });

                if (currentPasoId === id) setCurrentPasoId(pasos.find(p => p.id !== id).id);

                if (isOnline) {
                    await supabaseClient.from('pasos').delete().eq('id', id);
                    // Due to ON DELETE CASCADE on DB, or frontend optimistic removal
                }
            };

            const addMember = async (member) => {
                const newId = Date.now().toString();
                const status = member.status || 'titular';

                const fullMember = { ...member, id: newId, pasoId: currentPasoId, status, cuadrilla_type: currentCuadrilla };
                setMembers([...members, fullMember]);

                if (isOnline) {
                    await supabaseClient.from('members').insert({
                        id: newId,
                        paso_id: currentPasoId,
                        dni: member.dni,
                        name: member.name,
                        nickname: member.nickname,
                        address: member.address,
                        height: member.height,
                        phone: member.phone,
                        position: member.position,
                        status: status,
                        start_year: member.startYear,
                        trabajadera: member.trabajadera,
                        cuadrilla_type: currentCuadrilla
                    });
                }
            };

            const updateMember = async (id, updated) => {
                setMembers(members.map(m => m.id === id ? { ...m, ...updated } : m));

                if (isOnline) {
                    await supabaseClient.from('members').update({
                        dni: updated.dni,
                        name: updated.name,
                        nickname: updated.nickname,
                        address: updated.address,
                        height: updated.height,
                        phone: updated.phone,
                        position: updated.position,
                        status: updated.status,
                        start_year: updated.startYear,
                        trabajadera: updated.trabajadera,
                        cuadrilla_type: updated.cuadrilla_type
                    }).eq('id', id);
                }
            };

            const copyMember = async (memberId, targetPasoId, targetCuadrilla) => {
                const source = members.find(m => m.id === memberId);
                if (!source) return;

                const newId = Date.now().toString();
                const newMember = {
                    ...source,
                    id: newId,
                    pasoId: targetPasoId,
                    cuadrilla_type: targetCuadrilla,
                    position: '', // Reset position as it might be different
                    trabajadera: 0 // Reset trabajadera
                };

                setMembers([...members, newMember]);
                alert("Costalero copiado con éxito");

                if (isOnline) {
                    await supabaseClient.from('members').insert({
                        id: newId,
                        paso_id: targetPasoId,
                        dni: newMember.dni,
                        name: newMember.name,
                        nickname: newMember.nickname,
                        address: newMember.address,
                        height: newMember.height,
                        phone: newMember.phone,
                        position: newMember.position,
                        status: newMember.status,
                        start_year: newMember.startYear,
                        trabajadera: newMember.trabajadera,
                        cuadrilla_type: targetCuadrilla
                    });
                }
            };

            const deleteMember = async (id) => {
                setMembers(members.filter(m => m.id !== id));
                // Remove from assignments locally
                const newIguala = { ...igualaData };
                const pasoIguala = { ...newIguala[currentPasoId] };
                const newAssignments = { ...pasoIguala.assignments };
                Object.keys(newAssignments).forEach(key => {
                    if (newAssignments[key] === id) delete newAssignments[key];
                });
                pasoIguala.assignments = newAssignments;
                newIguala[currentPasoId] = pasoIguala;
                setIgualaData(newIguala);

                if (isOnline) {
                    await supabaseClient.from('members').delete().eq('id', id);
                    // Also need to push updated Iguala to clear assignment remotely
                    await supabaseClient.from('iguala').upsert({
                        id: `${currentPasoId}_${currentCuadrilla}`,
                        paso_id: currentPasoId,
                        cuadrilla_type: currentCuadrilla,
                        config: { rows: pasoIguala.rows, count: pasoIguala.count },
                        assignments: pasoIguala.assignments
                    }, { onConflict: 'paso_id, cuadrilla_type' });
                }
            };

            const promoteAspirante = async (member) => {
                if (!confirm(`¿Ascender a ${member.name} a Costalero (Titular)?`)) return;
                await updateMember(member.id, { ...member, status: 'titular' });
            };

            const demoteToAspirante = async (member) => {
                if (!confirm(`¿Mover a ${member.name} a la lista de Aspirantes? (Se vaciará su puesto de trabajo en la Igualá si lo tiene asignado)`)) return;
                
                // Limpiar asignaciones en alta y baja
                const newIguala = { ...igualaData };
                let equalsUpdated = false;

                ['alta', 'baja'].forEach(ctype => {
                    const key = `${member.pasoId}_${ctype}`;
                    if (newIguala[key]) {
                        const localAssign = { ...newIguala[key].assignments };
                        let modified = false;
                        Object.keys(localAssign).forEach(k => {
                            if (localAssign[k] === member.id) {
                                delete localAssign[k];
                                modified = true;
                                equalsUpdated = true;
                            }
                        });
                        newIguala[key] = { ...newIguala[key], assignments: localAssign };
                        
                        if (modified && isOnline) {
                            supabaseClient.from('iguala').upsert({
                                id: key,
                                paso_id: member.pasoId,
                                cuadrilla_type: ctype,
                                config: newIguala[key].config,
                                assignments: localAssign
                            }, { onConflict: 'paso_id, cuadrilla_type' }).then(({error}) => { if(error) console.error(error) });
                        }
                    }
                });

                if (equalsUpdated) setIgualaData(newIguala);
                
                await updateMember(member.id, { ...member, status: 'aspirante' });
            };

            // Unified Iguala Update (Config or Assignment)
            const updateIgualaData = async (newDataObj) => {
                setIgualaData(prev => ({
                    ...prev,
                    [`${currentPasoId}_${currentCuadrilla}`]: newDataObj
                }));

                if (isOnline) {
                    await supabaseClient.from('iguala').upsert({
                        id: `${currentPasoId}_${currentCuadrilla}`,
                        paso_id: currentPasoId,
                        cuadrilla_type: currentCuadrilla,
                        config: { rows: newDataObj.rows, count: newDataObj.count },
                        assignments: newDataObj.assignments
                    }, { onConflict: 'paso_id, cuadrilla_type' });
                }
            };

            const setIgualaConfig = (config) => {
                const currentKey = `${currentPasoId}_${currentCuadrilla}`;
                const current = igualaData[currentKey] || { rows: 8, count: 6, assignments: {} };
                const updated = { ...current, ...config };
                updateIgualaData(updated);
            };

            const assignSpot = (rowIdx, spotIdx, memberId) => {
                const current = igualaData[`${currentPasoId}_${currentCuadrilla}`] || { rows: 8, count: 6, assignments: {} };
                const updated = {
                    ...current,
                    assignments: { ...current.assignments, [`${rowIdx}-${spotIdx}`]: memberId }
                };
                updateIgualaData(updated);
            };

            const unassignSpot = (rowIdx, spotIdx) => {
                const current = igualaData[`${currentPasoId}_${currentCuadrilla}`] || { rows: 8, count: 6, assignments: {} };
                const newAssign = { ...current.assignments };
                delete newAssign[`${rowIdx}-${spotIdx}`];
                const updated = { ...current, assignments: newAssign };
                updateIgualaData(updated);
            };

            const createEvent = async (event) => {
                const newId = Date.now().toString();
                const newEvent = { ...event, id: newId };
                setEvents([...events, newEvent]);

                if (isOnline) {
                    await supabaseClient.from('events').insert({
                        id: newId,
                        paso_id: event.pasoId,
                        title: event.title,
                        date: event.date,
                        type: event.type
                    });
                }
            };

            const setPasoImage = async (imageData) => {
                setBackgroundImages(prev => {
                    const next = { ...prev };
                    if (imageData) next[currentPasoId] = imageData;
                    else delete next[currentPasoId];
                    return next;
                });

                if (isOnline) {
                    try {
                        const { error } = await supabaseClient.from('pasos').update({ bg_image: imageData || null }).eq('id', currentPasoId);
                        if (error) throw error;
                    } catch (e) {
                        console.error('API Error syncing image', e);
                        setSyncStatus('error');
                    }
                }
            };

            const currentMembers = useMemo(() => members.filter(m => m.pasoId === currentPasoId && (m.status === 'titular' || !m.status) && (m.cuadrilla_type === currentCuadrilla || !m.cuadrilla_type)), [members, currentPasoId, currentCuadrilla]);
            const currentAspirantes = useMemo(() => members.filter(m => m.pasoId === currentPasoId && m.status === 'aspirante'), [members, currentPasoId]);

            return {
                pasos, currentPasoId, setCurrentPasoId, createPaso, deletePaso, updatePaso, currentPaso: pasos.find(p => p.id === currentPasoId) || pasos[0] || { id: 'dummy', name: 'Cargando...', type: '-' },
                members, currentMembers, currentAspirantes, addMember, updateMember, deleteMember, promoteAspirante, demoteToAspirante, copyMember,
                igualaData, currentIguala: igualaData[`${currentPasoId}_${currentCuadrilla}`] || { rows: 8, count: 6, assignments: {} },
                setIgualaConfig, assignSpot, unassignSpot, currentCuadrilla, setCurrentCuadrilla,
                events, createEvent,
                // Persistence
                events, createEvent,
                // Persistence
                isOnline, syncStatus, setSyncStatus, supabaseUrl, supabaseKey, setSupabaseConfig, supabaseClient, fetchFromBackend, pushAllToBackend,
                backgroundImages, setPasoImage, currentBgImage: backgroundImages[currentPasoId]
            };
        };

        // --- Views ---

        const SettingsView = ({ store }) => {
            const [supabaseUrl, setSupabaseUrl] = useState(store.supabaseUrl || '');
            const [supabaseKey, setSupabaseKey] = useState(store.supabaseKey || '');

            const exportData = () => {
                const data = {
                    pasos: store.pasos,
                    members: store.members,
                    iguala: store.igualaData,
                    events: store.events,
                    date: new Date().toISOString()
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
                const href = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = href;
                link.download = `cofrade_backup_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const importData = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        console.log("Iniciando importación...");
                        const data = JSON.parse(e.target.result);
                        console.log("Datos leídos:", data);

                        if (!data || !data.pasos || !data.members) {
                            throw new Error("El archivo no tiene el formato correcto (faltan pasos o miembros).");
                        }

                        if (confirm(`Se han encontrado ${data.members.length} costaleros y ${data.pasos.length} pasos. ¿Sobrescribir datos locales?`)) {
                            // 1. Clear backend URL to ensure OFFLINE mode
                            localStorage.removeItem('cofrade_supabase_url');
                            localStorage.removeItem('cofrade_supabase_key');
                            store.setSupabaseConfig('', ''); // Update state immediately too

                            // 2. Save data
                            localStorage.setItem('cofrade_pasos', JSON.stringify(data.pasos));
                            localStorage.setItem('cofrade_members', JSON.stringify(data.members));
                            localStorage.setItem('cofrade_iguala_multi', JSON.stringify(data.iguala || {}));
                            localStorage.setItem('cofrade_events', JSON.stringify(data.events || []));

                            console.log("Datos guardados en LocalStorage.");

                            // 3. Reset current paso
                            if (data.pasos && data.pasos.length > 0) {
                                localStorage.setItem('cofrade_current_paso', data.pasos[0].id);
                                console.log("Paso actual reseteado a:", data.pasos[0].id);
                            }

                            alert("¡Importación correcta! La página se recargará ahora.");
                            window.location.reload();
                        }
                    } catch (err) {
                        console.error("Error importando:", err);
                        alert("Error al leer el archivo: " + err.message);
                    }
                };
                reader.readAsText(file);
            };

            return (
                <div className="space-y-8 max-w-2xl mx-auto">
                    <header>
                        <h2 className="text-3xl font-bold text-cofrade-dark">Configuración</h2>
                        <p className="text-cofrade-muted">Gestiona la conexión a la base de datos y copias de seguridad.</p>
                    </header>

                    <Card>
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <Icon name="database" className="text-cofrade-purple" /> Conexión Supabase
                        </h3>
                        <form onSubmit={(e) => { e.preventDefault(); store.setSupabaseConfig(supabaseUrl, supabaseKey); }} className="space-y-4">
                            <p className="text-sm text-gray-500 mb-4">
                                Configura la URL de tu proyecto Supabase y la clave pública (Anon Key).
                            </p>
                            <div className="flex flex-col gap-2">
                                <input required type="url" className="w-full px-3 py-2 border border-blue-200 rounded-lg bg-blue-50 focus:bg-white transition-colors"
                                    placeholder="https://xxxx.supabase.co"
                                    value={supabaseUrl} onChange={e => setSupabaseUrl(e.target.value)} />
                                <input required type="password" className="w-full px-3 py-2 border border-blue-200 rounded-lg bg-blue-50 focus:bg-white transition-colors"
                                    placeholder="Supabase Anon Key"
                                    value={supabaseKey} onChange={e => setSupabaseKey(e.target.value)} />
                                <Button type="submit" className="w-full mt-2">Guardar Configuración</Button>
                            </div>
                            {store.isOnline && (
                                <div className="bg-green-50 border border-green-200 text-green-800 p-2 rounded-lg flex items-center gap-2 text-sm mt-2">
                                    <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                    Conectado a Supabase
                                </div>
                            )}
                        </form>
                    </Card>

                    <Card>
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <Icon name="save" className="text-slate-600" /> Copias de Seguridad
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="p-4 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer text-center"
                                onClick={exportData}>
                                <Icon name="download" className="mx-auto mb-2 text-cofrade-purple" size={32} />
                                <h4 className="font-bold">Exportar Datos</h4>
                                <p className="text-xs text-gray-500 mt-1">Descarga un archivo JSON con toda tu información.</p>
                            </div>
                            <label className="p-4 border border-slate-200 rounded-lg hover:bg-slate-50 transition-colors cursor-pointer text-center block relative">
                                <input type="file" accept=".json" onChange={importData} className="hidden" />
                                <Icon name="upload" className="mx-auto mb-2 text-cofrade-gold" size={32} />
                                <h4 className="font-bold">Importar Datos</h4>
                                <p className="text-xs text-gray-500 mt-1">Restaura una copia de seguridad (JSON).</p>
                            </label>
                        </div>
                    </Card>

                    <Card>
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <Icon name="refresh-cw" className="text-cofrade-green" /> Sincronización Manual Supabase
                        </h3>
                        <p className="text-sm text-gray-500 mb-4">Usa estos botones si notas que los datos no se han actualizado automáticamente entre tus dispositivos.</p>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <Button variant="outline" className="w-full flex-col h-auto py-4" onClick={async () => {
                                if (!confirm("Esto sobrescribirá tus datos locales con los de Supabase. ¿Continuar?")) return;
                                try {
                                    await store.fetchFromBackend();
                                    alert("Datos descargados correctamente desde Supabase.");
                                } catch (e) {
                                    alert("Hubo un error al descargar. Comprueba tu conexión y credenciales.");
                                }
                            }}>
                                <Icon name="download-cloud" size={24} className="mb-2" />
                                <span>Forzar Descarga</span>
                                <span className="text-xs text-slate-500 mt-1 block font-normal">Sustituye lo local por la nube</span>
                            </Button>
                            
                            <Button variant="outline" className="w-full flex-col h-auto py-4 text-cofrade-gold border-cofrade-gold hover:bg-yellow-50" onClick={async () => {
                                if (!confirm("Esto sobrescribirá la nube de Supabase con los datos de este dispositivo. ¿Continuar?")) return;
                                await store.pushAllToBackend();
                            }}>
                                <Icon name="upload-cloud" size={24} className="mb-2" />
                                <span>Forzar Subida</span>
                                <span className="text-xs text-yellow-700 mt-1 block font-normal opacity-80">Empuja lo local a la nube</span>
                            </Button>
                        </div>
                    </Card>

                    <Card>
                        <h3 className="text-xl font-bold mb-4 flex items-center gap-2">
                            <Icon name="image" className="text-cofrade-purple" /> Personalización
                        </h3>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Imagen de Fondo ({store.currentPaso?.name || '...'})</label>
                                <div className="flex items-center gap-4">
                                    <label className="flex items-center gap-2 px-4 py-2 border border-slate-300 rounded-lg cursor-pointer hover:bg-slate-50 shadow-sm bg-white">
                                        <Icon name="upload" size={16} />
                                        <span className="text-sm font-medium">Subir Imagen</span>
                                        <input type="file" accept="image/*" className="hidden" onChange={(e) => {
                                            const file = e.target.files[0];
                                            if (file) {
                                                const reader = new FileReader();
                                                reader.onload = (ev) => store.setPasoImage(ev.target.result);
                                                reader.readAsDataURL(file);
                                            }
                                        }} />
                                    </label>
                                    {store.currentBgImage && (
                                        <Button variant="danger" onClick={() => store.setPasoImage(null)}>
                                            <Icon name="trash" size={16} /> Eliminar
                                        </Button>
                                    )}
                                </div>
                                <p className="text-xs text-slate-500 mt-2">La imagen se mostrará difuminada en el fondo de toda la aplicación.</p>
                            </div>
                        </div>
                    </Card>
                </div >
            );
        };

        const Dashboard = ({ store, setView }) => {
            const avgHeight = store.currentMembers.length
                ? (store.currentMembers.reduce((acc, m) => acc + Number(m.height), 0) / store.currentMembers.length).toFixed(1)
                : 0;

            return (
                <div className="space-y-6">
                    <header className="mb-8 flex justify-between items-end">
                        <div className="flex items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-bold text-cofrade-dark">{store.currentPaso?.name || 'Cargando...'}</h1>
                                <p className="text-cofrade-muted">Panel de control de la cuadrilla</p>
                            </div>
                            {store.isOnline && (
                                <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs font-bold flex items-center gap-1 border border-green-200">
                                    <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> Online
                                </span>
                            )}
                        </div>
                        <div className="bg-purple-100 text-cofrade-purple px-3 py-1 rounded-full text-sm font-bold uppercase tracking-wider">
                            {store.currentPaso?.type || '-'}
                        </div>
                    </header>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <Card className="border-l-4 border-cofrade-purple">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-sm font-medium text-gray-500 uppercase">Miembros</p>
                                    <p className="text-4xl font-bold text-cofrade-dark mt-1">{store.currentMembers.length}</p>
                                </div>
                                <div className="p-3 bg-purple-100 rounded-full text-cofrade-purple">
                                    <Icon name="users" size={32} />
                                </div>
                            </div>
                        </Card>
                        <Card className="border-l-4 border-cofrade-gold">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-sm font-medium text-gray-500 uppercase">Altura Media</p>
                                    <p className="text-4xl font-bold text-cofrade-dark mt-1">{avgHeight} <span className="text-base text-gray-400 font-normal">cm</span></p>
                                </div>
                                <div className="p-3 bg-yellow-100 rounded-full text-yellow-600">
                                    <Icon name="ruler" size={32} />
                                </div>
                            </div>
                        </Card>
                        <Card className="border-l-4 border-blue-500">
                            <div className="flex items-center justify-between">
                                <div>
                                    <p className="text-sm font-medium text-gray-500 uppercase">Agenda</p>
                                    <p className="text-4xl font-bold text-cofrade-dark mt-1">{store.events.length}</p>
                                </div>
                                <div className="p-3 bg-blue-100 rounded-full text-blue-600">
                                    <Icon name="calendar" size={32} />
                                </div>
                            </div>
                        </Card>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                        <div onClick={() => setView('iguala')} className="cursor-pointer group relative overflow-hidden rounded-xl bg-gradient-to-br from-cofrade-purple to-purple-800 p-8 text-white shadow-lg transition-transform hover:scale-[1.01]">
                            <Icon name="layout-grid" className="mb-4 opacity-80" size={32} />
                            <h3 className="text-2xl font-bold">La Igualá</h3>
                            <p className="opacity-80 mt-1">Ver distribución de trabajaderas</p>
                        </div>
                        <div onClick={() => setView('members')} className="cursor-pointer group relative overflow-hidden rounded-xl bg-white border border-gray-200 p-8 text-cofrade-dark shadow-sm transition-transform hover:scale-[1.01]">
                            <Icon name="user-plus" className="mb-4 text-cofrade-purple" size={32} />
                            <h3 className="text-2xl font-bold">Costaleros</h3>
                            <p className="text-gray-500 mt-1">Gestionar altas y bajas</p>
                        </div>
                    </div>
                </div>
            );
        };

        const CopyMemberModal = ({ isOpen, onClose, store, memberId }) => {
            const [targetPasoId, setTargetPasoId] = useState('');
            const [targetCuadrilla, setTargetCuadrilla] = useState('alta');

            if (!isOpen) return null;

            const handleCopy = () => {
                if (!targetPasoId) return alert("Selecciona un paso destino");
                store.copyMember(memberId, targetPasoId, targetCuadrilla);
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-0 md:p-4">
                    <div className="bg-white w-full h-full md:h-auto md:w-full md:max-w-md md:rounded-xl shadow-2xl overflow-hidden flex flex-col animate-in fade-in zoom-in-95 duration-200">
                        <div className="bg-slate-50 border-b border-slate-100 p-4 flex justify-between items-center shrink-0">
                            <h3 className="font-bold text-lg text-slate-800">Copiar Costalero</h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 p-2"><Icon name="x" size={20} /></button>
                        </div>
                        <div className="p-6 space-y-4 overflow-y-auto flex-1">
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Paso Destino</label>
                                <select className="w-full bg-white border border-slate-300 rounded-lg px-3 py-2 outline-none focus:ring-2 focus:ring-cofrade-purple"
                                    value={targetPasoId} onChange={e => setTargetPasoId(e.target.value)}>
                                    <option value="">Selecciona un paso...</option>
                                    {store.pasos.filter(p => p.id !== store.currentPasoId).map(p => (
                                        <option key={p.id} value={p.id}>{p.name}</option>
                                    ))}
                                    {/* Allow copying to same paso? Maybe useful for alta->baja copy */}
                                    <option value={store.currentPasoId}>{store.currentPaso?.name || 'Actual'} (Este paso)</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-slate-700 mb-1">Cuadrilla Destino</label>
                                <div className="flex gap-2">
                                    <button
                                        onClick={() => setTargetCuadrilla('alta')}
                                        className={`flex-1 py-2 rounded-lg border text-sm font-medium transition-colors ${targetCuadrilla === 'alta' ? 'bg-cofrade-purple text-white border-cofrade-purple' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                                    >
                                        Alta
                                    </button>
                                    <button
                                        onClick={() => setTargetCuadrilla('baja')}
                                        className={`flex-1 py-2 rounded-lg border text-sm font-medium transition-colors ${targetCuadrilla === 'baja' ? 'bg-cofrade-purple text-white border-cofrade-purple' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`}
                                    >
                                        Baja
                                    </button>
                                </div>
                            </div>
                            <div className="pt-4 flex gap-3">
                                <button onClick={onClose} className="flex-1 py-2 text-slate-500 font-medium hover:bg-slate-50 rounded-lg transition-colors">Cancelar</button>
                                <button onClick={handleCopy} className="flex-1 py-2 bg-cofrade-gold text-cofrade-dark font-bold rounded-lg hover:brightness-110 transition-all shadow-md">
                                    Copiar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const MembersView = ({ store }) => {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [copyMemberId, setCopyMemberId] = useState(null);
            const [formData, setFormData] = useState({
                dni: '', name: '', nickname: '', address: '', height: '', phone: '', position: 'Costero'
            });

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingId) {
                    store.updateMember(editingId, formData);
                } else {
                    store.addMember(formData);
                }
                closeModal();
            };

            const getAssignment = (memberId) => {
                if (!store.currentIguala?.assignments) return null;
                const entry = Object.entries(store.currentIguala.assignments).find(([k, v]) => v === memberId);
                if (!entry) return null;
                const [row, spot] = entry[0].split('-');
                return { row: parseInt(row), spot: parseInt(spot) };
            };

            const getSpotLabel = (row, spot) => {
                const rowCount = store.currentIguala.rows || 1;
                const spotsPerRow = store.currentIguala.count || 6;
                const isFirstLastRow = row === 1 || row === rowCount;
                const isOuter = spot === 1 || spot === spotsPerRow;
                const isNextOuter = spot === 2 || spot === spotsPerRow - 1;

                if (isOuter) return isFirstLastRow ? "Patero" : "Costero";
                if (isNextOuter) return "Fijador";
                return "Corriente";
            };

            const openEdit = (member) => {
                setFormData({
                    dni: member.dni || '',
                    name: member.name,
                    nickname: member.nickname || '',
                    address: member.address || '',
                    height: member.height,
                    phone: member.phone || '',
                    position: member.position || 'Costero'
                });
                setEditingId(member.id);
                setIsModalOpen(true);
            };

            const isEqual = (a, b) => JSON.stringify(a) === JSON.stringify(b);

            const handleExport = () => {
                const headers = ["DNI", "Nombre", "Teléfono", "Altura", "Trabajadera", "Puesto", "Año Ingreso"];
                const data = store.currentMembers.map(m => {
                    const assign = getAssignment(m.id);
                    const trab = assign ? `T-${assign.row}` : (m.trabajadera || '-');
                    const pos = assign ? getSpotLabel(assign.row, assign.spot) : m.position;
                    return [
                        m.dni || '',
                        m.name,
                        m.phone || '',
                        `${m.height} cm`,
                        trab,
                        pos,
                        m.startYear || '-'
                    ];
                });
                exportToPDF(`Listado Costaleros: ${store.currentPaso?.name || 'Costaleros'}`, headers, data, `costaleros_${store.currentPaso?.name || 'export'}.pdf`);
            };

            const closeModal = () => {
                setIsModalOpen(false);
                setEditingId(null);
                setFormData({ dni: '', name: '', nickname: '', address: '', height: '', phone: '', position: 'Costero', startYear: '' });
            };

            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center">
                        <h2 className="text-2xl font-bold text-cofrade-dark">Cuadrilla: {store.currentPaso?.name || '...'}</h2>
                        <div className="flex gap-2">
                            <Button onClick={handleExport} variant="ghost" className="bg-white border hover:bg-slate-50 text-slate-600">
                                <Icon name="file-down" size={18} /> PDF
                            </Button>
                            <Button onClick={() => setIsModalOpen(true)} variant="primary">
                                <Icon name="plus" size={18} /> Nuevo Costalero
                            </Button>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-slate-50 text-slate-500 font-semibold uppercase text-xs hidden md:table-header-group">
                                <tr>
                                    <th className="p-4">Costalero</th>
                                    <th className="p-4 hidden md:table-cell">Contacto</th>
                                    <th className="p-4">Altura</th>
                                    <th className="p-4">Trab.</th>
                                    <th className="p-4">Puesto</th>
                                    <th className="p-4">Año Ingreso</th>
                                    <th className="p-4 text-right">Acciones</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-slate-100">
                                {store.currentMembers.length === 0 ? (
                                    <tr>
                                        <td colSpan="7" className="p-8 text-center text-gray-400">
                                            No hay costaleros registrados en este paso.
                                        </td>
                                    </tr>
                                ) : store.currentMembers.map(member => (
                                    <React.Fragment key={member.id}>
                                        {/* Desktop Row */}
                                        <tr className="hover:bg-slate-50 transition-colors hidden md:table-row">
                                            <td className="p-4">
                                                <div className="font-bold text-slate-800">{member.name}</div>
                                                {member.nickname && <div className="text-xs text-cofrade-purple font-medium">"{member.nickname}"</div>}
                                                <div className="text-xs text-gray-400 uppercase mt-0.5">{member.dni}</div>
                                            </td>
                                            <td className="p-4 hidden md:table-cell">
                                                <div className="text-sm text-slate-600 flex items-center gap-1">
                                                    <Icon name="phone" size={12} /> {member.phone}
                                                </div>
                                                {member.address && (
                                                    <div className="text-xs text-slate-400 mt-1 flex items-center gap-1">
                                                        <Icon name="map-pin" size={12} /> {member.address}
                                                    </div>
                                                )}
                                            </td>
                                            <td className="p-4 text-slate-600 font-medium">{member.height} cm</td>
                                            <td className="p-4 font-bold text-slate-700 text-center">
                                                {(() => {
                                                    const assign = getAssignment(member.id);
                                                    return assign ? `T-${assign.row}` : (member.trabajadera || '-');
                                                })()}
                                            </td>
                                            <td className="p-4">
                                                <span className={`px-2 py-1 rounded-md text-xs font-semibold uppercase tracking-wide w-fit ${(() => {
                                                    const assign = getAssignment(member.id);
                                                    const pos = assign ? getSpotLabel(assign.row, assign.spot) : member.position;
                                                    return pos === 'PATERO' ? 'bg-purple-100 text-purple-700' :
                                                        pos === 'FIJADOR' ? 'bg-blue-100 text-blue-700' :
                                                            pos === 'COSTERO' ? 'bg-orange-100 text-orange-700' :
                                                                'bg-slate-100 text-slate-600';
                                                })()
                                                    }`}>
                                                    {(() => {
                                                        const assign = getAssignment(member.id);
                                                        return assign ? getSpotLabel(assign.row, assign.spot) : member.position;
                                                    })()}
                                                </span>
                                            </td>
                                            <td className="p-4 text-slate-600 font-medium">
                                                {member.startYear || '-'}
                                            </td>
                                            <td className="p-4 text-right">
                                                <div className="flex justify-end gap-2">
                                                    <button onClick={() => store.demoteToAspirante(member)} className="p-2 border rounded-lg text-orange-500 hover:bg-orange-50" title="Mover a Aspirantes"><Icon name="arrow-down-circle" size={16} /></button>
                                                    <button onClick={() => setCopyMemberId(member.id)} className="p-2 border rounded-lg text-slate-400 hover:text-cofrade-purple hover:bg-purple-50" title="Copiar a otro paso"><Icon name="copy" size={16} /></button>
                                                    <button onClick={() => openEdit(member)} className="p-2 border rounded-lg text-blue-500 hover:bg-blue-50" title="Editar"><Icon name="pencil" size={16} /></button>
                                                    <button onClick={() => { if (confirm('¿Borrar?')) store.deleteMember(member.id) }} className="p-2 border rounded-lg text-red-500 hover:bg-red-50" title="Eliminar"><Icon name="trash-2" size={16} /></button>
                                                </div>
                                            </td>
                                        </tr>

                                        {/* Mobile Card */}
                                        <tr className="md:hidden block border-b border-slate-100 p-4">
                                            <td className="block">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <div className="font-bold text-slate-800 text-lg">{member.name}</div>
                                                        <div className="flex items-center gap-2 text-sm text-gray-500">
                                                            {member.nickname && <span className="text-cofrade-purple font-medium">"{member.nickname}"</span>}
                                                            <span>• {member.height} cm</span>
                                                        </div>
                                                    </div>
                                                    <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase ${(() => {
                                                        const assign = getAssignment(member.id);
                                                        const pos = assign ? getSpotLabel(assign.row, assign.spot) : member.position;
                                                        return pos === 'PATERO' ? 'bg-purple-100 text-purple-700' : 'bg-slate-100 text-slate-600';
                                                    })()
                                                        }`}>
                                                        {(() => {
                                                            const assign = getAssignment(member.id);
                                                            return assign ? getSpotLabel(assign.row, assign.spot) : member.position;
                                                        })()}
                                                    </span>
                                                </div>

                                                <div className="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-3">
                                                    <div className="flex items-center gap-1"><Icon name="phone" size={12} /> {member.phone || '-'}</div>
                                                    <div className="flex items-center gap-1"><Icon name="user" size={12} /> Trab: <span className="font-bold">{
                                                        (() => {
                                                            const assign = getAssignment(member.id);
                                                            return assign ? `T-${assign.row}` : (member.trabajadera || '-');
                                                        })()
                                                    }</span></div>
                                                </div>

                                                <div className="flex gap-2 mt-3">
                                                    <Button onClick={() => store.demoteToAspirante(member)} variant="ghost" className="bg-orange-50 border border-orange-200 text-xs py-1 h-8 px-2 text-orange-600" title="Mover a Aspirantes">
                                                        <Icon name="arrow-down-circle" size={14} />
                                                    </Button>
                                                    <Button onClick={() => setCopyMemberId(member.id)} variant="ghost" className="bg-slate-50 border border-slate-200 text-xs py-1 h-8 px-2 text-slate-500" title="Copiar a otro Paso">
                                                        <Icon name="copy" size={14} />
                                                    </Button>
                                                    <Button onClick={() => openEdit(member)} variant="ghost" className="flex-1 bg-slate-50 border border-slate-200 text-xs py-1 h-8">
                                                        Editar
                                                    </Button>
                                                    <Button onClick={() => { if (confirm('¿Borrar costalero?')) store.deleteMember(member.id) }} variant="ghost" className="flex-1 bg-red-50 border border-red-100 text-red-600 text-xs py-1 h-8">
                                                        Borrar
                                                    </Button>
                                                </div>
                                            </td>
                                        </tr>
                                    </React.Fragment>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    <Modal isOpen={isModalOpen} onClose={closeModal} title={editingId ? "Editar Costalero" : "Nuevo Costalero"}>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div className="grid grid-cols-3 gap-4">
                                <div className="col-span-1">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">DNI</label>
                                    <input required type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none uppercase"
                                        value={formData.dni} onChange={e => setFormData({ ...formData, dni: e.target.value })} placeholder="12345678A" />
                                </div>
                                <div className="col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                                    <input required type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.name} onChange={e => setFormData({ ...formData, name: e.target.value })} placeholder="Ej: Juan Pérez" />
                                </div>
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Apodo / Mote</label>
                                    <input type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.nickname} onChange={e => setFormData({ ...formData, nickname: e.target.value })} placeholder='Ej: "El Largo"' />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Teléfono</label>
                                    <input type="tel" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.phone} onChange={e => setFormData({ ...formData, phone: e.target.value })} placeholder="600000000" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Dirección</label>
                                <input type="text" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                    value={formData.address} onChange={e => setFormData({ ...formData, address: e.target.value })} placeholder="C/ Gran Poder, 2" />
                            </div>

                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Altura (cm)</label>
                                    <input required type="number" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.height} onChange={e => setFormData({ ...formData, height: e.target.value })} placeholder="175" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Trab. (Opcional)</label>
                                    <input type="number" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.trabajadera || ''} onChange={e => setFormData({ ...formData, trabajadera: e.target.value })} placeholder="-" />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Año Ingreso</label>
                                    <input type="number" min="1900" max="2100" className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none"
                                        value={formData.startYear} onChange={e => setFormData({ ...formData, startYear: e.target.value })} placeholder="2020" />
                                </div>
                                <div className="col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Puesto Preferido</label>
                                    <select className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-cofrade-purple focus:border-transparent outline-none bg-white"
                                        value={formData.position} onChange={e => setFormData({ ...formData, position: e.target.value })}>
                                        <option value="Patero">Patero</option>
                                        <option value="Fijador">Fijador</option>
                                        <option value="Costero">Costero</option>
                                        <option value="Corriente">Corriente</option>
                                    </select>
                                </div>
                            </div>
                            <div className="pt-4 flex justify-end gap-2">
                                <Button type="button" variant="ghost" onClick={closeModal}>Cancelar</Button>
                                <Button type="submit">{editingId ? 'Guardar Cambios' : 'Registrar'}</Button>
                            </div>
                        </form>
                    </Modal>
